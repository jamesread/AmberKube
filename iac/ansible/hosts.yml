---
# Default inventory (same directory as ansible.cfg). Set ansible_host for your environment.
# Secrets (SSH key, kubeadm join token/hash): create group_vars/all/vault.yml from vault.yml.example (ansible-vault; not committed — see README).
all:
  vars:
    # create-libvirt-vm mode: virt-customize (default if unset), cloud-init, or ignition. Use ignition with kubeworker_ignition_url for FCOS. Step 3.2 installs Kubernetes on workers.
    customize_type: cloud-init
    # Number of kubeworker VMs to create (create-workers-libvirt.yml / create-libvirt-vm role `count`).
    kubeworker_count: 3
    # RAM per kubeworker VM in MiB (passed to virt-install as --memory).
    kubeworker_ram_mb: 8192
    # Directory for kubeworker disks and cloud-init ISOs (libvirt storage pool path; trailing slash optional).
    kubeworker_storage_domain: /speedy/VMs/
    # HTTP(S) URL to Ignition for FCOS kubeworkers (e.g. http://kubemaster-ip/config.ign from Step 2.3). Empty = cloud-init ISO path.
    kubeworker_ignition_url: "http://192.168.66.70/config.ign"
    # Embedded into generated config.bu (Step 2.3) for kubeadm-join.service — control plane host:port, e.g. 192.168.1.10:6443
    kubeadm_join_server: "192.168.66.70:6443"
  children:
    kubemasters:
      hosts:
        kubemaster:
          ansible_user: root
    local:
      hosts:
        localhost:
          ansible_connection: local
    # Libvirt hosts for playbooks/create-workers-libvirt.yml (first host is used). Host key is arbitrary.
    hypervisor:
      hosts:
        firsthypervisor:
          ansible_host: stuffbox
          ansible_user: root

    # Step 3.2 (kubeworker-k8s-bootstrap.yml): host count must match kubeworker_count; names should match VM names from Step 3.1 (e.g. kubeworker-01).
    kubeworkers:
      hosts:
        kubeworker-01:
        kubeworker-02:
        kubeworker-03:
