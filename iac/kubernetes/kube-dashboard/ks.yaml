apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-dashboard
  namespace: flux-system
spec:
  interval: 5m
  path: ./iac/kubernetes/kube-dashboard/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: kube-dashboard
  ignore: |
    values.yaml
