# Named flux-system-apps to avoid clashing with the root bootstrap Kustomization also named flux-system.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system-apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./iac/kubernetes/flux-system/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
