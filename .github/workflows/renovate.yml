---
# Self-hosted Renovate (weekly). Uses GITHUB_TOKEN (no PAT). Grant enough permissions so Renovate
# can open PRs, manage the dependency dashboard issue, and edit workflows when bumping action pins.
# Note: PRs opened by GITHUB_TOKEN do not trigger other workflows on their own (GitHub limitation).
# https://docs.github.com/en/actions/security-guides/automatic-token-authentication
name: Renovate

on:
  schedule:
    # Weekly: Monday 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.repository }}
          RENOVATE_INTERNAL_CHECKS_FILTER: strict
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
