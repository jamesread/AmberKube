---
# Self-hosted Renovate (weekly). Uses a PAT from repo secret RENOVATE_TOKEN (create a fine-grained PAT
# with Contents/Issues/PRs and Dependabot alerts read for this repo; add it under Settings → Secrets).
# PRs opened with a PAT run as that user and can trigger other workflows (unlike GITHUB_TOKEN PRs).
name: Renovate

on:
  schedule:
    # Weekly: Monday 06:00 UTC
    - cron: '0 */1 * * *'
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.12
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.repository }}
          RENOVATE_INTERNAL_CHECKS_FILTER: strict
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
